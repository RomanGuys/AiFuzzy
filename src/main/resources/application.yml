spring:
  datasource:
    url: jdbc:h2:mem:aifuzzy;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: WARN
    org.hibernate.SQL: WARN
